<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - {{.CompanyName}}</title>
    <script>
        // Apply saved theme immediately — before any rendering — to prevent white flash
        (function() {
            var saved = localStorage.getItem('theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
            }
        })();
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/alpinejs@3.13.3" defer></script>
    <script>
        document.addEventListener('alpine:init', function() {
            Alpine.store('sidebar', {
                open: false,
                toggle() {
                    this.open = !this.open;
                },
                close() {
                    this.open = false;
                }
            });
        });
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link rel="stylesheet" href="/assets/css/dark.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* Alpine.js cloak - hide elements before Alpine initializes */
        [x-cloak] { display: none !important; }
        /* Toast notification */
        .toast-container { position: fixed; bottom: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 0.75rem 1.25rem; border-radius: 8px; background: var(--surface); border: 1px solid var(--bordLight); box-shadow: var(--shadow2); font-size: 14px; animation: slideIn 0.3s ease; }
        .toast-success { border-left: 3px solid var(--success); }
        .toast-error { border-left: 3px solid var(--error); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        /* Submenu styles */
        .sidebar-nav-group { display: flex; flex-direction: column; }
        .sidebar-nav-group .sidebar-link { cursor: pointer; }
        .sidebar-nav-group .sidebar-link .chevron { margin-left: auto; transition: transform 0.2s ease; }
        .sidebar-nav-group .sidebar-link .chevron.open { transform: rotate(180deg); }
        .sidebar-submenu { padding-left: 2.5rem; display: flex; flex-direction: column; overflow: hidden; max-height: 0; transition: max-height 0.25s ease, opacity 0.2s ease; opacity: 0; }
        .sidebar-submenu.open { max-height: 200px; opacity: 1; }
        .sidebar-submenu .sidebar-link { font-size: 13px; padding: 0.4rem 0.75rem; }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Mobile sidebar overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay" x-data x-show="$store.sidebar.open" @click="$store.sidebar.open = false" x-transition.opacity></div>

        <!-- Sidebar -->
        <aside class="sidebar" x-data x-bind:class="$store.sidebar.open ? 'sidebar-open' : ''">
            <div class="sidebar-header">
                <a href="/admin/dashboard" class="sidebar-brand">
                    <span class="sidebar-logo">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </span>
                    <span class="sidebar-title">{{.CompanyName}}</span>
                </a>
                <button class="sidebar-close" @click="$store.sidebar.open = false" aria-label="Close sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-label">Main Menu</div>
                <a href="/admin/dashboard" class="sidebar-link {{if eq .Page "dashboard"}}active{{end}}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    <span>Dashboard</span>
                </a>
                <a href="/admin/devices" class="sidebar-link {{if eq .Page "devices"}}active{{end}} {{if eq .Page "devices_form"}}active{{end}}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
                    <span>Devices</span>
                </a>
                <a href="/admin/audio" class="sidebar-link {{if eq .Page "audio"}}active{{end}} {{if eq .Page "audio_upload"}}active{{end}}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                    <span>Audio Library</span>
                </a>
                <a href="/admin/schedules" class="sidebar-link {{if eq .Page "schedules"}}active{{end}} {{if eq .Page "schedules_form"}}active{{end}}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>Schedules</span>
                </a>
                <a href="/admin/broadcast-now" class="sidebar-link {{if eq .Page "broadcast_now"}}active{{end}}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <span>Broadcast Now</span>
                </a>
                <a href="/admin/logs" class="sidebar-link {{if eq .Page "logs"}}active{{end}}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    <span>Logs</span>
                </a>
                <div class="sidebar-section-label" style="margin-top: 8px;">Configuration</div>
                <!-- Prayer with collapsible submenu -->
                <div class="sidebar-nav-group" x-data="{ open: {{if or (eq .Page "prayer_setting") (eq .Page "prayer_time") (eq .Page "prayer_broadcast")}}true{{else}}false{{end}} }">
                    <div class="sidebar-link {{if or (eq .Page "prayer_setting") (eq .Page "prayer_time") (eq .Page "prayer_broadcast")}}active{{end}}" @click="open = !open">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                        <span>Prayer</span>
                        <svg class="chevron" :class="open ? 'open' : ''" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <div class="sidebar-submenu" :class="open ? 'open' : ''">
                        <a href="/admin/prayer/setting" class="sidebar-link {{if eq .Page "prayer_setting"}}active{{end}}">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                            <span>Setting</span>
                        </a>
                        <a href="/admin/prayer/time" class="sidebar-link {{if eq .Page "prayer_time"}}active{{end}}">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            <span>Time</span>
                        </a>
                        <a href="/admin/prayer/broadcast" class="sidebar-link {{if eq .Page "prayer_broadcast"}}active{{end}}">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            <span>Broadcast</span>
                        </a>
                    </div>
                </div>
                <a href="/admin/settings" class="sidebar-link {{if eq .Page "settings"}}active{{end}}">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="/logout" class="sidebar-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle" @click="$store.sidebar.open = !$store.sidebar.open" aria-label="Toggle sidebar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1 class="topbar-title">{{.Title}}</h1>
                </div>
                <div class="topbar-right">
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
                        <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/>
                            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                        </svg>
                        <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                    <span class="topbar-user">{{.User.Name}}</span>
                </div>
            </header>

            <!-- Page Content -->
            <div class="content-wrapper" id="main-content">
                {{template "content" .}}
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // Sidebar toggle — delegates to Alpine store
        (function() {
            function initSidebar() {
                var toggleBtn = document.querySelector('.sidebar-toggle');
                var sidebar = document.querySelector('.sidebar');
                var overlay = document.getElementById('sidebarOverlay');
                var closeBtn = document.querySelector('.sidebar-close');
                
                if (!toggleBtn || !sidebar) return;
                
                function toggleSidebar() {
                    if (typeof Alpine !== 'undefined' && Alpine.store('sidebar')) {
                        Alpine.store('sidebar').toggle();
                    } else {
                        // Fallback if Alpine not loaded
                        sidebar.classList.toggle('sidebar-open');
                    }
                }
                
                function closeSidebar() {
                    if (typeof Alpine !== 'undefined' && Alpine.store('sidebar')) {
                        Alpine.store('sidebar').close();
                    } else {
                        sidebar.classList.remove('sidebar-open');
                    }
                }
                
                toggleBtn.addEventListener('click', toggleSidebar);
                
                if (overlay) {
                    overlay.addEventListener('click', closeSidebar);
                }
                
                if (closeBtn) {
                    closeBtn.addEventListener('click', closeSidebar);
                }
            }
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initSidebar);
            } else {
                initSidebar();
            }
        })();

        // Theme toggle
        function toggleTheme() {
            var html = document.documentElement;
            var current = html.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        // HTMX toast handling
        document.addEventListener('htmx:afterRequest', function(evt) {
            var trigger = evt.detail.xhr.getResponseHeader('HX-Trigger');
            if (trigger) {
                try {
                    var data = JSON.parse(trigger);
                    if (data.toast) {
                        showToast(data.toast, 'success');
                    }
                    if (data.reload) {
                        setTimeout(function() {
                            // Reload the current page content via HTMX
                            var currentPath = window.location.pathname;
                            htmx.ajax('GET', currentPath, {target: '#main-content', swap: 'innerHTML'});
                        }, 500);
                    }
                } catch(e) {}
            }
        });

        // Destroy Alpine state before HTMX swaps new content.
        document.addEventListener('htmx:beforeSwap', function(evt) {
            if (typeof Alpine !== 'undefined') {
                var target = evt.detail.target;
                if (target) {
                    try { Alpine.destroyTree(target); } catch(e) {}
                }
            }
        });

        // Alpine 3.x has a built-in MutationObserver that automatically detects
        // new x-data elements in the DOM. HTMX swaps trigger that observer,
        // so we do NOT need to call Alpine.initTree() here.
        // Calling initTree in addition to the MutationObserver causes double init
        // of components inside #modal-container, leading to duplicate entries.
        // We only need destroyTree in beforeSwap to clean stale state.

        function showToast(message, type) {
            var container = document.getElementById('toast-container');
            var toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
