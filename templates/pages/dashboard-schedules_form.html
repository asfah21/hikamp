{{define "content"}}
<div class="modal-overlay" x-data="scheduleForm(
    {{if .Data.Schedule}}
        {{if .Data.Schedule.Entries}}[
            {{- range $i, $e := .Data.Schedule.Entries}}{{- if $i}},{{end}}
            {audioId:'{{$e.AudioID}}',beginHour:'{{parseTime $e.BeginTime "h"}}',beginMinute:'{{parseTime $e.BeginTime "m"}}',beginSecond:'{{parseTime $e.BeginTime "s"}}',endHour:'{{parseTime $e.EndTime "h"}}',endMinute:'{{parseTime $e.EndTime "m"}}',endSecond:'{{parseTime $e.EndTime "s"}}',volume:'{{$e.Volume}}'}
            {{- end}}
        ]{{else}}[]{{end}}
    {{else}}[]{{end}},
    {{if .Data.Schedule}}'{{.Data.Schedule.ScheduleType}}'{{else}}'daily'{{end}}
)">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header">
            <h3>{{if .Data.Schedule}}Edit Schedule{{else}}Add Schedule{{end}}</h3>
            <button class="btn btn-ghost" onclick="var el = this.closest('.modal-overlay'); if(window.Alpine) { try { Alpine.destroyTree(el); } catch(e) {} } el.remove()">&times;</button>
        </div>
        <form hx-post="{{if .Data.Schedule}}/admin/schedules/edit/{{.Data.Schedule.ID}}{{else}}/admin/schedules/create{{end}}" hx-target="#main-content" hx-swap="innerHTML" @submit.prevent="setTimeValues(); $el.submit()">
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Schedule Name</label>
                    <input type="text" name="name" class="input-field" value="{{if .Data.Schedule}}{{.Data.Schedule.Name}}{{end}}" required>
                </div>

                <div class="form-row" style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">Start Date</label>
                        <div class="custom-date-picker" x-data="{ 
                            open: false, 
                            value: '{{if and .Data.Schedule .Data.Schedule.StartDate}}{{.Data.Schedule.StartDate}}{{end}}',
                            year: new Date().getFullYear(),
                            month: new Date().getMonth(),
                            get daysInMonth() {
                                return new Date(this.year, this.month + 1, 0).getDate();
                            },
                            get firstDayOfMonth() {
                                return new Date(this.year, this.month, 1).getDay();
                            },
                            get monthName() {
                                return ['January','February','March','April','May','June','July','August','September','October','November','December'][this.month];
                            },
                            prevMonth() {
                                this.month--;
                                if (this.month < 0) { this.month = 11; this.year--; }
                            },
                            nextMonth() {
                                this.month++;
                                if (this.month > 11) { this.month = 0; this.year++; }
                            },
                            selectDate(day) {
                                var m = String(this.month + 1).padStart(2, '0');
                                var d = String(day).padStart(2, '0');
                                this.value = this.year + '-' + m + '-' + d;
                                this.open = false;
                            },
                            clearDate() {
                                this.value = '';
                                this.open = false;
                            },
                            init() {
                                if (this.value) {
                                    var parts = this.value.split('-');
                                    if (parts.length === 3) {
                                        this.year = parseInt(parts[0]);
                                        this.month = parseInt(parts[1]) - 1;
                                    }
                                }
                            }
                        }">
                            <input type="hidden" name="start_date" x-model="value">
                            <div class="date-input-display" @click="open = !open" :class="{ 'has-value': value }">
                                <span x-show="!value" style="color: var(--inkSubtle);">Select date</span>
                                <span x-show="value" x-text="value"></span>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: auto; flex-shrink: 0; opacity: 0.5;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            </div>
                            <div class="date-picker-dropdown" x-show="open" @click.away="open = false" x-cloak x-transition>
                                <div class="date-picker-header">
                                    <button type="button" class="date-picker-nav" @click="prevMonth()">&lsaquo;</button>
                                    <span class="date-picker-title" x-text="monthName + ' ' + year"></span>
                                    <button type="button" class="date-picker-nav" @click="nextMonth()">&rsaquo;</button>
                                </div>
                                <div class="date-picker-weekdays">
                                    <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
                                </div>
                                <div class="date-picker-grid">
                                    <template x-for="i in firstDayOfMonth" :key="'empty-' + i">
                                        <span></span>
                                    </template>
                                    <template x-for="day in daysInMonth" :key="day">
                                        <button type="button" class="date-picker-day" 
                                            :class="{ 'selected': value === year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0') }"
                                            @click="selectDate(day)" 
                                            x-text="day">
                                        </button>
                                    </template>
                                </div>
                                <div class="date-picker-footer">
                                    <button type="button" class="btn btn-sm btn-ghost" @click="clearDate()" x-show="value" style="font-size: 12px; color: var(--error);">Clear</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label class="form-label">End Date</label>
                        <div class="custom-date-picker" x-data="{ 
                            open: false, 
                            value: '{{if and .Data.Schedule .Data.Schedule.EndDate}}{{.Data.Schedule.EndDate}}{{end}}',
                            year: new Date().getFullYear(),
                            month: new Date().getMonth(),
                            get daysInMonth() {
                                return new Date(this.year, this.month + 1, 0).getDate();
                            },
                            get firstDayOfMonth() {
                                return new Date(this.year, this.month, 1).getDay();
                            },
                            get monthName() {
                                return ['January','February','March','April','May','June','July','August','September','October','November','December'][this.month];
                            },
                            prevMonth() {
                                this.month--;
                                if (this.month < 0) { this.month = 11; this.year--; }
                            },
                            nextMonth() {
                                this.month++;
                                if (this.month > 11) { this.month = 0; this.year++; }
                            },
                            selectDate(day) {
                                var m = String(this.month + 1).padStart(2, '0');
                                var d = String(day).padStart(2, '0');
                                this.value = this.year + '-' + m + '-' + d;
                                this.open = false;
                            },
                            clearDate() {
                                this.value = '';
                                this.open = false;
                            },
                            init() {
                                if (this.value) {
                                    var parts = this.value.split('-');
                                    if (parts.length === 3) {
                                        this.year = parseInt(parts[0]);
                                        this.month = parseInt(parts[1]) - 1;
                                    }
                                }
                            }
                        }">
                            <input type="hidden" name="end_date" x-model="value">
                            <div class="date-input-display" @click="open = !open" :class="{ 'has-value': value }">
                                <span x-show="!value" style="color: var(--inkSubtle);">Select date</span>
                                <span x-show="value" x-text="value"></span>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left: auto; flex-shrink: 0; opacity: 0.5;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            </div>
                            <div class="date-picker-dropdown" x-show="open" @click.away="open = false" x-cloak x-transition>
                                <div class="date-picker-header">
                                    <button type="button" class="date-picker-nav" @click="prevMonth()">&lsaquo;</button>
                                    <span class="date-picker-title" x-text="monthName + ' ' + year"></span>
                                    <button type="button" class="date-picker-nav" @click="nextMonth()">&rsaquo;</button>
                                </div>
                                <div class="date-picker-weekdays">
                                    <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
                                </div>
                                <div class="date-picker-grid">
                                    <template x-for="i in firstDayOfMonth" :key="'empty-' + i">
                                        <span></span>
                                    </template>
                                    <template x-for="day in daysInMonth" :key="day">
                                        <button type="button" class="date-picker-day" 
                                            :class="{ 'selected': value === year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0') }"
                                            @click="selectDate(day)" 
                                            x-text="day">
                                        </button>
                                    </template>
                                </div>
                                <div class="date-picker-footer">
                                    <button type="button" class="btn btn-sm btn-ghost" @click="clearDate()" x-show="value" style="font-size: 12px; color: var(--error);">Clear</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Schedule Type</label>
                    <select name="schedule_type" class="input-field" x-model="type">
                        <option value="daily" {{if eq .Data.Schedule.ScheduleType "daily"}}selected{{end}}>Daily</option>
                        <option value="weekly" {{if eq .Data.Schedule.ScheduleType "weekly"}}selected{{end}}>Weekly</option>
                        <option value="specific_date" {{if eq .Data.Schedule.ScheduleType "specific_date"}}selected{{end}}>Specific Date</option>
                    </select>
                </div>

                <template x-if="type === 'weekly'">
                <div class="form-group">
                    <label class="form-label">Day of Week</label>
                    <select name="day_of_week" class="input-field">
                        <option value="1" {{if and .Data.Schedule .Data.Schedule.DayOfWeek (eq .Data.Schedule.DayOfWeek 1)}}selected{{end}}>Monday</option>
                        <option value="2" {{if and .Data.Schedule .Data.Schedule.DayOfWeek (eq .Data.Schedule.DayOfWeek 2)}}selected{{end}}>Tuesday</option>
                        <option value="3" {{if and .Data.Schedule .Data.Schedule.DayOfWeek (eq .Data.Schedule.DayOfWeek 3)}}selected{{end}}>Wednesday</option>
                        <option value="4" {{if and .Data.Schedule .Data.Schedule.DayOfWeek (eq .Data.Schedule.DayOfWeek 4)}}selected{{end}}>Thursday</option>
                        <option value="5" {{if and .Data.Schedule .Data.Schedule.DayOfWeek (eq .Data.Schedule.DayOfWeek 5)}}selected{{end}}>Friday</option>
                        <option value="6" {{if and .Data.Schedule .Data.Schedule.DayOfWeek (eq .Data.Schedule.DayOfWeek 6)}}selected{{end}}>Saturday</option>
                        <option value="7" {{if and .Data.Schedule .Data.Schedule.DayOfWeek (eq .Data.Schedule.DayOfWeek 7)}}selected{{end}}>Sunday</option>
                    </select>
                </div>
                </template>

                <template x-if="type === 'specific_date'">
                <div class="form-group">
                    <label class="form-label">Specific Date</label>
                    <input type="date" name="specific_date" class="input-field" value="{{if and .Data.Schedule .Data.Schedule.SpecificDate}}{{.Data.Schedule.SpecificDate}}{{end}}">
                </div>
                </template>

                <!-- Entries section -->
                <div class="form-section">
                    <div class="form-section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                        <label class="form-label" style="margin-bottom: 0;">Time Ranges (Entries)</label>
                        <button type="button" class="btn btn-sm btn-secondary" @click="addEntry()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Add Entry
                        </button>
                    </div>

                    <template x-for="(entry, idx) in entries" :key="idx">
                    <div class="entry-card" style="border: 1px solid var(--bordLight); border-radius: 8px; padding: 0.75rem; margin-bottom: 0.5rem;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <span style="font-weight: 600; font-size: 0.85em; color: var(--inkMuted);" x-text="'Entry #' + (idx + 1)"></span>
                            <button type="button" class="btn btn-sm btn-ghost" @click="removeEntry(idx)" x-show="entries.length > 1" style="color: var(--error);">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>
                        <div class="form-row" style="margin-top: 0.5rem;">
                            <div class="form-group" style="flex: 1;">
                                <label class="form-label" style="font-size: 0.8em;">Audio</label>
                                <select :name="'audio_id'" class="input-field" x-model="entry.audioId" @change="onAudioChange(idx)">
                                    <option value="">Select Audio</option>
                                    {{range $a := .Data.Audio}}
                                    <option value="{{$a.ID}}" data-duration="{{$a.Duration}}">{{$a.Name}}</option>
                                    {{end}}
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group" style="flex: 1;">
                                <label class="form-label" style="font-size: 0.8em;">Begin Time</label>
                                <div class="time-picker-row">
                                    <select :name="'begin_hour'" class="input-field time-select" x-model="entry.beginHour">
                                        {{range $h := seq 24}}<option value="{{printf "%02d" $h}}">{{printf "%02d" $h}}</option>{{end}}
                                    </select>
                                    <span class="time-sep">:</span>
                                    <select :name="'begin_minute'" class="input-field time-select" x-model="entry.beginMinute">
                                        {{range $m := seq 60}}<option value="{{printf "%02d" $m}}">{{printf "%02d" $m}}</option>{{end}}
                                    </select>
                                    <span class="time-sep">:</span>
                                    <select :name="'begin_second'" class="input-field time-select" x-model="entry.beginSecond">
                                        {{range $s := seq 60}}<option value="{{printf "%02d" $s}}">{{printf "%02d" $s}}</option>{{end}}
                                    </select>
                                    <input type="hidden" :name="'begin_time'" :value="beginTimeValue(idx)">
                                </div>
                                <div class="time-picker-actions" style="margin-top: 0.25rem;">
                                    <button type="button" class="btn btn-sm btn-secondary" @click="setBeginToNow(idx)" title="Set to current time">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                        Now
                                    </button>
                                    <button type="button" class="btn btn-sm btn-secondary" @click="autoFillFromAudio(idx)" title="Auto-fill based on audio duration">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                        Auto
                                    </button>
                                </div>
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <label class="form-label" style="font-size: 0.8em;">End Time</label>
                                <div class="time-picker-row">
                                    <select :name="'end_hour'" class="input-field time-select" x-model="entry.endHour">
                                        {{range $h := seq 24}}<option value="{{printf "%02d" $h}}">{{printf "%02d" $h}}</option>{{end}}
                                    </select>
                                    <span class="time-sep">:</span>
                                    <select :name="'end_minute'" class="input-field time-select" x-model="entry.endMinute">
                                        {{range $m := seq 60}}<option value="{{printf "%02d" $m}}">{{printf "%02d" $m}}</option>{{end}}
                                    </select>
                                    <span class="time-sep">:</span>
                                    <select :name="'end_second'" class="input-field time-select" x-model="entry.endSecond">
                                        {{range $s := seq 60}}<option value="{{printf "%02d" $s}}">{{printf "%02d" $s}}</option>{{end}}
                                    </select>
                                    <input type="hidden" :name="'end_time'" :value="endTimeValue(idx)">
                                </div>
                                <div class="time-picker-actions" style="margin-top: 0.25rem;">
                                    <button type="button" class="btn btn-sm btn-secondary" @click="setEndToBeginPlusDuration(idx)" title="End = begin + audio duration">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                        +Duration
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group" style="flex: 0 0 120px;">
                                <label class="form-label" style="font-size: 0.8em;">Volume</label>
                                <input type="number" :name="'volume'" class="input-field" min="0" max="100" x-model="entry.volume">
                            </div>
                        </div>
                    </div>
                    </template>
                </div>

                <!-- Devices section -->
                <div class="form-section" style="margin-top: 1rem;">
                    <div class="form-section-header" style="margin-bottom: 0.5rem;">
                        <label class="form-label" style="margin-bottom: 0;">Target Devices</label>
                    </div>
                    <div class="device-list" style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                        {{range $d := .Data.Devices}}
                        <label class="form-checkbox" style="display: flex; align-items: center; gap: 0.35rem; padding: 0.35rem 0.5rem; border: 1px solid var(--bordLight); border-radius: 6px; cursor: pointer;">
                            <input type="checkbox" name="device_id" value="{{$d.ID}}" {{if $.Data.Schedule}}{{range $sd := $.Data.Schedule.Devices}}{{if eq $sd.DeviceID $d.ID}}checked{{end}}{{end}}{{end}}>
                            <span>{{$d.Name}}</span>
                        </label>
                        {{else}}
                        <span style="color: var(--inkMuted); font-size: 0.85em;">No devices available. Create a device first.</span>
                        {{end}}
                    </div>
                </div>

                <div class="form-group" style="margin-top: 0.75rem;">
                    <label class="form-checkbox">
                        <input type="checkbox" name="enabled" {{if or (not .Data.Schedule) (.Data.Schedule.Enabled)}}checked{{end}}>
                        <span>Enabled</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" onclick="var el = this.closest('.modal-overlay'); if(window.Alpine) { try { Alpine.destroyTree(el); } catch(e) {} } el.remove()">Cancel</button>
                <button type="submit" class="btn btn-primary">{{if .Data.Schedule}}Update{{else}}Create{{end}}</button>
            </div>
        </form>
    </div>
</div>

<script>
function scheduleForm(entries, type) {
    // entries is the Go-rendered JSON array (may be empty)
    // type is the schedule type string
    if (!entries || !Array.isArray(entries) || entries.length === 0) {
        entries = [{
            audioId: '',
            beginHour: '12',
            beginMinute: '00',
            beginSecond: '00',
            endHour: '12',
            endMinute: '05',
            endSecond: '00',
            volume: '50'
        }];
    }

    return {
        type: type || 'daily',
        entries: entries,

        pad: function(n) { return String(n).padStart(2, '0'); },

        addEntry: function() {
            this.entries.push({
                audioId: '',
                beginHour: '12',
                beginMinute: '00',
                beginSecond: '00',
                endHour: '12',
                endMinute: '05',
                endSecond: '00',
                volume: '50'
            });
        },

        removeEntry: function(idx) {
            if (this.entries.length > 1) {
                this.entries.splice(idx, 1);
            }
        },

        beginTimeValue: function(idx) {
            var e = this.entries[idx];
            return e.beginHour + ':' + e.beginMinute + ':' + e.beginSecond;
        },

        endTimeValue: function(idx) {
            var e = this.entries[idx];
            return e.endHour + ':' + e.endMinute + ':' + e.endSecond;
        },

        getAudioDuration: function(idx) {
            var selects = document.querySelectorAll('select[name="audio_id"]');
            if (idx >= selects.length) return 0;
            var sel = selects[idx];
            if (!sel || !sel.value) return 0;
            var opt = sel.options[sel.selectedIndex];
            return parseInt(opt.getAttribute('data-duration')) || 0;
        },

        onAudioChange: function(idx) {
            this.autoFillFromAudio(idx);
        },

        setBeginToNow: function(idx) {
            var now = new Date();
            var e = this.entries[idx];
            e.beginHour = this.pad(now.getHours());
            e.beginMinute = this.pad(now.getMinutes());
            e.beginSecond = this.pad(now.getSeconds());
        },

        autoFillFromAudio: function(idx) {
            var dur = this.getAudioDuration(idx);
            if (dur <= 0) return;
            var now = new Date();
            var e = this.entries[idx];
            e.beginHour = this.pad(now.getHours());
            e.beginMinute = this.pad(now.getMinutes());
            e.beginSecond = '00';
            this.calcEndFromBegin(idx, dur);
        },

        calcEndFromBegin: function(idx, dur) {
            var e = this.entries[idx];
            var h = parseInt(e.beginHour);
            var m = parseInt(e.beginMinute);
            var s = parseInt(e.beginSecond);
            var totalSec = h * 3600 + m * 60 + s + dur;
            totalSec = totalSec % 86400;
            e.endHour = this.pad(Math.floor(totalSec / 3600));
            var rem = totalSec % 3600;
            e.endMinute = this.pad(Math.floor(rem / 60));
            e.endSecond = this.pad(rem % 60);
        },

        setEndToBeginPlusDuration: function(idx) {
            var dur = this.getAudioDuration(idx);
            if (dur <= 0) dur = 300;
            this.calcEndFromBegin(idx, dur);
        },

        setTimeValues: function() {
            // Alpine's x-model already keeps form values in sync
        }
    };
}
</script>
{{end}}
