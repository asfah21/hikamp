{{define "content"}}
<div class="dashboard-panel" style="max-width: 500px;">
    <div class="dashboard-panel-header">
        <h3>Manual Broadcast</h3>
        <p>Select a device and audio file to broadcast immediately.</p>
    </div>
    <div class="dashboard-panel-body">
        <form hx-post="/admin/broadcast-now" hx-target="#main-content" hx-swap="innerHTML">
            <div class="form-group">
                <label class="form-label">Device</label>
                <select name="device_id" class="input-field" required>
                    <option value="">Select Device</option>
                    {{range .Data.Devices}}
                    <option value="{{.ID}}">{{.Name}} ({{.IPAddress}})</option>
                    {{end}}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Audio</label>
                <select name="audio_id" id="audio-select" class="input-field" required onchange="setDurationFromAudio(this)">
                    <option value="">Select Audio</option>
                    {{range .Data.Audio}}
                    <option value="{{.ID}}" data-duration="{{.Duration}}">{{.Name}}{{if .DurationStr}} ({{.DurationStr}}){{end}}</option>
                    {{end}}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Volume (0-100)</label>
                <input type="number" name="volume" class="input-field" min="0" max="100" value="50">
            </div>
            <div class="form-group" x-data="broadcastDuration()">
                <label class="form-label">Duration</label>
                <div class="time-picker-row">
                    <div x-data="timeSpinner(13, 'durHour')">
                        <div class="time-spinner-arrow" @click="up()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
                        </div>
                        <div class="time-spinner" @click="cycle()">
                            <div class="time-spinner-highlight"></div>
                            <div class="time-spinner-inner" x-bind:style="'transform: translateY(-' + (offset * 40) + 'px)'">
                                <template x-for="item in items" :key="item">
                                    <div class="time-spinner-item" x-bind:class="{'active': item === localValue}">
                                        <span x-text="String(item).padStart(2, '0')"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <div class="time-spinner-arrow" @click="down()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </div>
                        <select name="duration_hours" class="time-spinner-hidden-select" x-model="durHour">
                            <template x-for="item in items" :key="item">
                                <option x-bind:value="item" x-text="String(item).padStart(2, '0')"></option>
                            </template>
                        </select>
                    </div>
                    <span class="time-sep">:</span>
                    <div x-data="timeSpinner(60, 'durMin')">
                        <div class="time-spinner-arrow" @click="up()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
                        </div>
                        <div class="time-spinner" @click="cycle()">
                            <div class="time-spinner-highlight"></div>
                            <div class="time-spinner-inner" x-bind:style="'transform: translateY(-' + (offset * 40) + 'px)'">
                                <template x-for="item in items" :key="item">
                                    <div class="time-spinner-item" x-bind:class="{'active': item === localValue}">
                                        <span x-text="String(item).padStart(2, '0')"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <div class="time-spinner-arrow" @click="down()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </div>
                        <select name="duration_minutes" class="time-spinner-hidden-select" x-model="durMin">
                            <template x-for="item in items" :key="item">
                                <option x-bind:value="item" x-text="String(item).padStart(2, '0')"></option>
                            </template>
                        </select>
                    </div>
                    <span class="time-sep">:</span>
                    <div x-data="timeSpinner(60, 'durSec')">
                        <div class="time-spinner-arrow" @click="up()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
                        </div>
                        <div class="time-spinner" @click="cycle()">
                            <div class="time-spinner-highlight"></div>
                            <div class="time-spinner-inner" x-bind:style="'transform: translateY(-' + (offset * 40) + 'px)'">
                                <template x-for="item in items" :key="item">
                                    <div class="time-spinner-item" x-bind:class="{'active': item === localValue}">
                                        <span x-text="String(item).padStart(2, '0')"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <div class="time-spinner-arrow" @click="down()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </div>
                        <select name="duration_seconds" class="time-spinner-hidden-select" x-model="durSec">
                            <template x-for="item in items" :key="item">
                                <option x-bind:value="item" x-text="String(item).padStart(2, '0')"></option>
                            </template>
                        </select>
                    </div>
                </div>
                <small style="color: var(--inkMuted); font-size: 12px;">Duration auto-fills from selected audio. Adjust as needed.</small>
            </div>
            <div class="dashboard-panel-footer">
                <button type="submit" class="btn btn-primary" style="background: var(--error); border-color: var(--error);">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Broadcast Now
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function setDurationFromAudio(select) {
    const option = select.options[select.selectedIndex];
    const durationSec = parseInt(option.getAttribute('data-duration')) || 0;
    if (durationSec > 0) {
        const hours = Math.floor(durationSec / 3600);
        const minutes = Math.floor((durationSec % 3600) / 60);
        const seconds = durationSec % 60;
        // Update Alpine state via the broadcastDuration component
        const el = select.closest('[x-data="broadcastDuration()"]');
        if (el && el.__x) {
            el.__x.$data.durHour = String(hours).padStart(2, '0');
            el.__x.$data.durMin = String(minutes).padStart(2, '0');
            el.__x.$data.durSec = String(seconds).padStart(2, '0');
        }
    }
}
</script>
{{end}}
