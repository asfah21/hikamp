{{define "content"}}
{{$settings := .Data}}
<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <h3 class="card-title">General Settings</h3>
        <form hx-post="/admin/settings/save" hx-target="#main-content" hx-swap="innerHTML">
            {{range $settings}}
            <div class="form-group">
                <label class="form-label">{{.Key | title}}</label>
                {{if eq .Key "dark_mode"}}
                <select name="{{.Key}}" class="input-field">
                    <option value="true" {{if eq .Value "true"}}selected{{end}}>Enabled</option>
                    <option value="false" {{if eq .Value "false"}}selected{{end}}>Disabled</option>
                </select>
                {{else if eq .Key "auto_sync"}}
                <select name="{{.Key}}" class="input-field">
                    <option value="true" {{if eq .Value "true"}}selected{{end}}>Enabled</option>
                    <option value="false" {{if eq .Value "false"}}selected{{end}}>Disabled</option>
                </select>
                {{else}}
                <input type="text" name="{{.Key}}" class="input-field" value="{{.Value}}">
                {{end}}
                {{if .Description}}<small style="color: var(--inkMuted);">{{.Description}}</small>{{end}}
            </div>
            {{end}}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Settings</button>
            </div>
        </form>
    </div>
</div>
{{end}}
