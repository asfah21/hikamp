services:
  mbti-app:
    build: .
    container_name: hikamp
    restart: always
    ports:
      - "10.10.11.5:8081:8080"
    environment:
      - GIN_MODE=release
      - TZ=Asia/Jakarta
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - app-network

networks:
  app-network:
    external: true
